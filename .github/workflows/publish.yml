name: Publish Conda Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build And Test Conda Package
    runs-on: ubuntu-latest

    env:
      CHANNEL: micknudsen

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: itdiscover-build
          environment-file: environment.yml
          channels: conda-forge,bioconda,defaults
          channel-priority: strict
          use-mamba: true

      - name: Install conda-build
        shell: bash -l {0}
        run: |
          conda install -n itdiscover-build -y -c conda-forge conda-build

      - name: Build package
        shell: bash -l {0}
        run: |
          mkdir -p dist
          python -m conda_build.cli.main_build conda-recipe/ --output-folder dist
          find dist -maxdepth 3 -type f | sort

      - name: Locate built package
        id: locate
        shell: bash -l {0}
        run: |
          PKG_PATH="$(find dist -type f \( -name "*.conda" -o -name "*.tar.bz2" \) | head -n 1)"
          if [ -z "$PKG_PATH" ]; then
            CONDA_BLD_PATH="$(conda info --base)/envs/itdiscover-build/conda-bld"
            if [ -d "$CONDA_BLD_PATH" ]; then
              PKG_PATH="$(find "$CONDA_BLD_PATH" -type f \( -name "*.conda" -o -name "*.tar.bz2" \) | head -n 1)"
            fi
          fi
          if [ -z "$PKG_PATH" ]; then
            echo "No conda package found in dist/ or the environment conda-bld cache"
            exit 1
          fi
          echo "pkg_path=${PKG_PATH}" >> "$GITHUB_OUTPUT"

      - name: Smoke test built package
        shell: bash -l {0}
        run: |
          python -m conda_build.cli.main_build --test "${{ steps.locate.outputs.pkg_path }}"

      - name: Upload conda artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-package
          path: ${{ steps.locate.outputs.pkg_path }}

  publish-conda:
    name: Publish To Anaconda Channel
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      CHANNEL: micknudsen

    environment:
      name: conda
      url: https://anaconda.org/micknudsen/itdiscover

    steps:
      - name: Download conda artifact
        uses: actions/download-artifact@v4
        with:
          name: conda-package
          path: dist

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: itdiscover-publish
          python-version: "3.12"

      - name: Install upload tooling
        shell: bash -l {0}
        run: |
          conda install -y -c defaults anaconda-client

      - name: Publish package to micknudsen channel
        shell: bash -l {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          PKG_PATH=$(find dist -type f \( -name "*.conda" -o -name "*.tar.bz2" \) | head -n 1)
          if [ -z "$PKG_PATH" ]; then
            echo "No conda package found to upload"
            exit 1
          fi
          anaconda -t "$ANACONDA_API_TOKEN" upload --user "$CHANNEL" "$PKG_PATH"
