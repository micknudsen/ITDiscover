name: Publish Conda Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish (for example v0.1.1)"
        required: true
      channel:
        description: "Anaconda channel/user to publish to"
        required: true

jobs:
  build-and-test:
    name: Build And Test Conda Package
    runs-on: ubuntu-latest

    env:
      CHANNEL: ${{ github.event.inputs.channel || 'MOMA-AUH' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: itdiscover-build
          environment-file: environment.yml
          channels: conda-forge,bioconda,defaults
          channel-priority: strict
          use-mamba: true

      - name: Install conda-build
        shell: bash -l {0}
        run: |
          conda install -y -c conda-forge conda-build

      - name: Verify conda-build availability
        shell: bash -l {0}
        run: |
          conda info
          conda list conda-build
          conda-build --version

      - name: Build package
        shell: bash -l {0}
        run: |
          conda-build conda-recipe/

      - name: Locate built package
        id: locate
        shell: bash -l {0}
        run: |
          PKG_PATH="$(conda-build conda-recipe/ --output)"
          if [ -z "$PKG_PATH" ]; then
            echo "No conda package path reported by conda build"
            exit 1
          fi
          if [ ! -f "$PKG_PATH" ]; then
            echo "Reported package path does not exist: $PKG_PATH"
            exit 1
          fi
          echo "pkg_path=${PKG_PATH}" >> "$GITHUB_OUTPUT"

      - name: Smoke test built package
        shell: bash -l {0}
        run: |
          conda-build --test "${{ steps.locate.outputs.pkg_path }}"

      - name: Upload conda artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-package
          path: ${{ steps.locate.outputs.pkg_path }}

  publish-conda:
    name: Publish To Anaconda Channel
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      CHANNEL: ${{ github.event.inputs.channel || 'MOMA-AUH' }}

    environment:
      name: conda
      url: https://anaconda.org/${{ github.event.inputs.channel || 'MOMA-AUH' }}/itdiscover

    steps:
      - name: Download conda artifact
        uses: actions/download-artifact@v4
        with:
          name: conda-package
          path: dist

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: itdiscover-publish
          python-version: "3.12"

      - name: Install upload tooling
        shell: bash -l {0}
        run: |
          conda install -y -c defaults anaconda-client

      - name: Publish package to configured channel
        shell: bash -l {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          PKG_PATH=$(find dist -type f \( -name "*.conda" -o -name "*.tar.bz2" \) | head -n 1)
          if [ -z "$PKG_PATH" ]; then
            echo "No conda package found to upload"
            exit 1
          fi
          anaconda -t "$ANACONDA_API_TOKEN" upload --skip-existing --user "$CHANNEL" "$PKG_PATH"
